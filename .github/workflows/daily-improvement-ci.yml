name: Daily Improvement CI

on:
  push:
    paths:
      - "src/daily_improvement/**"
      - "data/daily_improvement/**"
      - "pyproject.toml"
      - ".github/workflows/daily-improvement-ci.yml"
  pull_request:
    paths:
      - "src/daily_improvement/**"
      - "data/daily_improvement/**"
      - "pyproject.toml"
      - ".github/workflows/daily-improvement-ci.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .[dev]

      - name: Run daily improvement CLI
        run: daily-improvement --source data/daily_improvement/sample_raw_items.json --run-date 2026-04-25 --json
